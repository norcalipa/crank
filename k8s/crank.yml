---
apiVersion: v1
kind: Namespace
metadata:
  name: crank
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crank
  namespace: crank
  labels:
    app.kubernetes.io/name: crank
    app.kubernetes.io/instance: crank
    app.kubernetes.io/version: ${GITHUB_SHA}
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: crank
      app.kubernetes.io/instance: crank
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crank
        app.kubernetes.io/instance: crank
    spec:
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
      # `fats` is the k3s host (10.0.0.10) that runs the MySQL database on
      # :3306. It is not a Kubernetes Service and does not resolve via in-cluster
      # DNS, so DB_HOST=fats fails with EAI_AGAIN inside containers. Inject the
      # mapping into each pod's /etc/hosts so the hostname resolves without
      # depending on DNS or hardcoding the IP in the ConfigMap.
      hostAliases:
        - ip: "10.0.0.10"
          hostnames:
            - "fats"
      # In-cluster DNS (CoreDNS) cannot resolve external names in this cluster
      # (the node's upstream resolver is unreachable from pods), so the OAuth
      # token exchange fails: `Failed to resolve 'oauth2.googleapis.com'
      # ([Errno -3] Try again)`. With dnsPolicy: ClusterFirst the cluster DNS is
      # prepended (so in-cluster names like `redis-master` still resolve) and
      # these public nameservers are appended as fallbacks for external names.
      # The resolver tries the next server on a temporary failure (EAI_AGAIN),
      # so external queries succeed via 8.8.8.8 / 1.1.1.1.
      dnsPolicy: ClusterFirst
      dnsConfig:
        nameservers:
          - 8.8.8.8
          - 1.1.1.1
        options:
          - name: timeout
            value: "2"
          - name: attempts
            value: "3"
      containers:
        - name: crank-container
          image: ghcr.io/norcalipa/crank/crank:${GITHUB_SHA}
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            timeoutSeconds: 1
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            timeoutSeconds: 1
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "1"
            limits:
              memory: "512Mi"
              cpu: "1"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                  name: crank-config
            - secretRef:
                name: db-connect-credentials
      imagePullSecrets:
        - name: ghcr-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: crank
  namespace: crank
  labels:
    app.kubernetes.io/name: crank
    app.kubernetes.io/instance: crank
    app.kubernetes.io/version: ${GITHUB_SHA}
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
      nodePort: 30800
  selector:
    app.kubernetes.io/name: crank
    app.kubernetes.io/instance: crank
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: crank-hpa
  namespace: crank
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: crank
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80